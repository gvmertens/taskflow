# ============================================================
# TaskFlow API — Configurações para ambiente de testes
# ============================================================

spring.application.name=taskflow-test

# ------------------------------------------------------------
# DataSource — PostgreSQL (banco de testes)
# ------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/taskflow_test
spring.datasource.username=taskflow
spring.datasource.password=taskflow
spring.datasource.driver-class-name=org.postgresql.Driver

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Flyway — Migrações de esquema
# ------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
