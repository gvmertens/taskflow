# ============================================================
# TaskFlow API — Configurações para ambiente de testes
# ============================================================
# DataSource gerenciado pelo Testcontainers via @DynamicPropertySource
# As propriedades abaixo são sobrescritas em tempo de execução pelo container.

spring.application.name=taskflow-test

# ------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# Flyway — Migrações de esquema (roda no container de teste)
# ------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
